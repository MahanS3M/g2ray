name: Cloud Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL or search query'
        required: true
        type: string
      mode:
        description: 'audio | video | file'
        required: true
        default: 'audio'
        type: choice
        options:
          - audio
          - video
          - file
      client:
        description: 'YouTube client: android|web|default'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - android
          - web

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq 2>&1 | tail -1
          sudo pip install -q yt-dlp
          echo "✅ yt-dlp $(yt-dlp --version) + ffmpeg ready"

      - name: Download file
        run: |
          URL="${{ inputs.url }}"
          MODE="${{ inputs.mode }}"
          CLIENT="${{ inputs.client }}"

          # If not a URL, treat as yt-dlp search
          if [[ ! "$URL" =~ ^https?:// ]]; then
            URL="ytsearch:$URL"
            echo "🔍 Searching: $URL"
          fi

          # Build extra args
          EXTRA=""
          if [[ "$URL" =~ youtube\.com|youtu\.be ]] && [[ "$CLIENT" != "default" ]]; then
            EXTRA="--extractor-args youtube:player_client=$CLIENT"
            echo "📺 YouTube with $CLIENT client"
          fi

          if [ "$MODE" = "audio" ]; then
            yt-dlp -x --audio-format mp3 --audio-quality 0 -o "output.%(ext)s" --no-warnings $EXTRA "$URL"
          elif [ "$MODE" = "video" ]; then
            yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "output.%(ext)s" --no-warnings $EXTRA "$URL"
          else
            yt-dlp -o "output.%(ext)s" --no-warnings $EXTRA "$URL"
          fi
          echo "FILE=$(ls output.*)" >> $GITHUB_ENV

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FILE="${{ env.FILE }}"
          [[ -z "$FILE" ]] && { echo "❌ No file found"; exit 1; }
          SIZE=$(stat -c%s "$FILE")
          echo "📁 $FILE ($(numfmt --to=iec $SIZE))"

          EXT="${FILE##*.}"
          if [[ "$EXT" == "mp3" || "$EXT" == "ogg" || "$EXT" == "m4a" || "$EXT" == "flac" || "$EXT" == "wav" ]]; then
            METHOD="sendAudio"; FIELD="audio"
          elif [[ "$EXT" == "mp4" || "$EXT" == "mkv" || "$EXT" == "webm" ]]; then
            METHOD="sendVideo"; FIELD="video"
          elif [[ "$EXT" == "jpg" || "$EXT" == "jpeg" || "$EXT" == "png" || "$EXT" == "gif" ]]; then
            METHOD="sendPhoto"; FIELD="photo"
          else
            METHOD="sendDocument"; FIELD="document"
          fi

          echo "📤 Sending via $METHOD..."
          curl -s -F "$FIELD=@$FILE" -F "chat_id=$CHAT_ID" \
            "https://api.telegram.org/bot$BOT_TOKEN/$METHOD" | \
            jq -r '.ok as $ok | if $ok then "✅ Sent! ID: \(.result.message_id)" else "❌ \(.description)" end'
